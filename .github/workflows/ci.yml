name: CI

on:
  push:
  pull_request:

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Install Bun dependencies
        run: |
          bun install --cwd frontend --frozen-lockfile
          bun install --cwd server --frozen-lockfile
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.10.4
      - name: Install Lua tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install busted
      - name: Install Stylua
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ github.token }}
          version: latest
          args: --check .
      - name: Lua smoke
        run: nvim --headless -i NONE -u tests/minimal_init.lua -l tests/nvim_smoke.lua -c qa
      - name: Busted unit specs (all tests/*_spec.lua; integration gated separately)
        run: busted tests/*_spec.lua
      - name: No-orphan supervision gate (NFR-3)
        run: busted tests/integration/orphan_spec.lua
      - name: Bun tests
        run: bun test server
      - name: E2E cold-open relay (Story 1.4 AC2)
        run: bun test tests/e2e/render.spec.ts
      - name: Release workflow syntax
        run: ruby -e 'require "yaml"; YAML.load_file(".github/workflows/release.yml")'
      - name: Release target smoke
        run: bun run scripts/release.ts validate-targets
      - name: Frontend bundle smoke
        run: bun build frontend/index.html --outdir dist/frontend
      - name: Frontend unit tests (DOT helpers, view-state, reset keybinding)
        run: bun test frontend

  # Windows no-orphan verification (Story 4.1 AC4 / Epic-3 retro AI#2). Closes the
  # "Windows no-orphan unverified" gap: the shipped server-windows-x64.exe prebuilt
  # must self-terminate when the parent Neovim dies. Two layers:
  #  - bun test (Windows Bun runtime): stdin-EOF self-termination + heartbeat backstop
  #  - PowerShell harness: full real-nvim parent-death -> pipe-close -> reap chain
  windows-no-orphan:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Install Bun dependencies
        run: |
          bun install --cwd frontend --frozen-lockfile
          bun install --cwd server --frozen-lockfile
      - name: Server supervision tests (stdin-EOF + heartbeat on Windows Bun)
        run: bun test server/supervisor.test.ts server/stdio.test.ts
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.10.4
      - name: Pre-stage the Windows prebuilt (robust fetch; the test then cache-hits)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # resolve_server_cmd cache-hits when dist/bin/<artifact> already matches the
          # committed checksum, skipping its in-Lua curl download (a 110MB transfer that
          # stalls intermittently on cold runners). gh handles auth/redirects/retries.
          New-Item -ItemType Directory -Force -Path dist/bin | Out-Null
          gh release download v0.6.1 --repo ${{ github.repository }} --pattern server-windows-x64.exe --dir dist/bin --clobber
      - name: No-orphan supervision gate (NFR-3, Windows)
        shell: pwsh
        run: ./tests/integration/run_orphan_check.ps1
