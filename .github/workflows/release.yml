name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install Bun dependencies
        run: |
          bun install --cwd frontend --frozen-lockfile
          bun install --cwd server --frozen-lockfile
      - name: Validate release context
        id: context
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            if [ "${GITHUB_REF_TYPE:-}" != "tag" ] || [ -z "${GITHUB_REF_NAME:-}" ]; then
              echo "::error::Tagged release publishing requires a tag ref."
              exit 1
            fi
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate release targets
        run: bun run scripts/release.ts validate-targets
      - name: Build release artifacts for manifest preparation
        if: steps.context.outputs.publish != 'true'
        run: bun run scripts/release.ts build --out-dir dist/release --write-checksums checksums.txt
      - name: Upload prepared checksum manifest
        if: steps.context.outputs.publish != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prepared-checksums
          path: checksums.txt
          if-no-files-found: error
      - name: Build release artifacts and verify committed checksums
        if: steps.context.outputs.publish == 'true'
        run: bun run scripts/release.ts build --out-dir dist/release --write-checksums dist/release/checksums.txt --verify-against checksums.txt
      - name: Publish GitHub Release assets
        if: steps.context.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.context.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::GH_TOKEN is required to publish release assets."
            exit 1
          fi
          echo "Creating release for ${RELEASE_TAG}. If this step fails after creation, inspect the release for partial assets before retrying."
          gh release create "$RELEASE_TAG" \
            dist/release/server-linux-x64 \
            dist/release/server-linux-arm64 \
            dist/release/server-linux-x64-musl \
            dist/release/server-linux-arm64-musl \
            dist/release/server-darwin-x64 \
            dist/release/server-darwin-arm64 \
            dist/release/server-windows-x64.exe \
            dist/release/checksums.txt \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --generate-notes
